#JPA Basic Setting
#SQL , display
spring.jpa.show-sql=true
#SQL , Easy Reading
spring.jpa.properties.hibernate.format_sql=true
# No Vender DDL
spring.jpa.generate-ddl=true
#JPA Database Setting
spring.jpa.database=oracle